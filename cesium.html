<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Cesium Renderer</title>

  <script src="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Cesium.js"></script>
  <link href="https://cesium.com/downloads/cesiumjs/releases/1.111/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

  <style>
    html, body, #cesiumContainer {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: black;
    }
  </style>
</head>

<body>
<div id="cesiumContainer"></div>

<script>
Cesium.Ion.defaultAccessToken = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4MDNiNDQ4Yi1hMzg0LTQxYzEtYjMxYy00NGJlMjBiN2I4YzYiLCJpZCI6NDA2NzI3LCJpYXQiOjE3NzQwNTEzMzd9.W410ifK9UItmiq6mZIr0ot8JXGgi4T9mCBc9GIUaykA";

// 🔴 VERY IMPORTANT (backend waits for this)
window.renderReady = false;

async function init() {

  const viewer = new Cesium.Viewer("cesiumContainer", {
    terrainProvider: new Cesium.EllipsoidTerrainProvider(),

    // remove UI (important for clean video)
    animation: false,
    timeline: false,
    baseLayerPicker: false,
    geocoder: false,
    homeButton: false,
    sceneModePicker: false,
    navigationHelpButton: false,
    infoBox: false,
    selectionIndicator: false,

    shadows: true,
    shouldAnimate: true
  });

  viewer.scene.globe.enableLighting = true;

  // ✅ YOUR 3D TILE
  const tileset = await Cesium.Cesium3DTileset.fromIonAssetId(4550299);
  viewer.scene.primitives.add(tileset);

  await tileset.readyPromise;

  window.viewer = viewer;
  window.tileset = tileset;

  // 🎬 START CINEMATIC
  startCinematic();

  // ✅ tell backend it's ready
  window.renderReady = true;
}

function startCinematic() {

  const viewer = window.viewer;
  const tileset = window.tileset;

  const shots = [
    { heading: 30, pitch: -25, range: 3.0, duration: 4 },
    { heading: 120, pitch: -35, range: 2.0, duration: 4 },
    { heading: 210, pitch: -45, range: 1.6, duration: 4 },
    { heading: 300, pitch: -30, range: 2.5, duration: 4 }
  ];

  let index = 0;

  function nextShot() {

    const shot = shots[index];

    viewer.camera.flyToBoundingSphere(tileset.boundingSphere, {
      duration: shot.duration,
      offset: new Cesium.HeadingPitchRange(
        Cesium.Math.toRadians(shot.heading),
        Cesium.Math.toRadians(shot.pitch),
        tileset.boundingSphere.radius * shot.range
      ),
      easingFunction: Cesium.EasingFunction.QUADRATIC_IN_OUT,
      complete: () => {
        index = (index + 1) % shots.length;
        setTimeout(nextShot, 500);
      }
    });
  }

  nextShot();
}

init();
</script>
</body>
</html>
